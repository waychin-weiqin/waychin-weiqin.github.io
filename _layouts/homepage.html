---
---

{% include base_path %}

<!doctype html>
<html lang="{{ site.locale | slice: 0,2 }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ site.title }}</title>
    <meta name="description" content="{{ site.description }}">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <!-- Academicons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/jpswalsh/academicons@1/css/academicons.min.css">

    {% include head/custom.html %}

    <style>
      :root {
        --color-primary: #1a56db;
        --color-primary-light: #e8effd;
        --color-accent: #7c3aed;
        --color-text: #1f2937;
        --color-text-secondary: #6b7280;
        --color-bg: #ffffff;
        --color-bg-alt: #f8fafc;
        --color-border: #e5e7eb;
        --color-card-bg: #ffffff;
        --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        --font-mono: 'JetBrains Mono', monospace;
        --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
        --shadow-md: 0 4px 12px rgba(0,0,0,0.06);
        --shadow-lg: 0 8px 24px rgba(0,0,0,0.08);
        --radius: 12px;
        --max-width: 860px;
      }

      [data-theme="dark"] {
        --color-primary: #60a5fa;
        --color-primary-light: #1e3a5f;
        --color-accent: #a78bfa;
        --color-text: #f1f5f9;
        --color-text-secondary: #94a3b8;
        --color-bg: #0f172a;
        --color-bg-alt: #1e293b;
        --color-border: #334155;
        --color-card-bg: #1e293b;
        --shadow-sm: 0 1px 2px rgba(0,0,0,0.2);
        --shadow-md: 0 4px 12px rgba(0,0,0,0.3);
        --shadow-lg: 0 8px 24px rgba(0,0,0,0.4);
      }

      * { margin: 0; padding: 0; box-sizing: border-box; }

      html {
        scroll-behavior: smooth;
        scroll-padding-top: 80px;
      }

      body {
        font-family: var(--font-sans);
        font-size: 16px;
        line-height: 1.7;
        color: var(--color-text);
        background: var(--color-bg);
        -webkit-font-smoothing: antialiased;
      }

      /* Floating theme toggle */
      .theme-toggle {
        position: fixed;
        top: 1.2rem;
        right: 1.5rem;
        z-index: 100;
        background: var(--color-card-bg);
        border: 1px solid var(--color-border);
        cursor: pointer;
        font-size: 1rem;
        color: var(--color-text-secondary);
        width: 38px;
        height: 38px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: var(--shadow-md);
        transition: all 0.2s ease;
      }

      .theme-toggle:hover {
        color: var(--color-primary);
        border-color: var(--color-primary);
        transform: scale(1.05);
      }

      /* Main Content */
      .container {
        max-width: var(--max-width);
        margin: 0 auto;
        padding: 0 1.5rem;
      }

      /* Hero / About */
      .hero {
        padding-top: 4rem;
        padding-bottom: 3rem;
      }

      .hero__grid {
        display: grid;
        grid-template-columns: 180px 1fr;
        gap: 2.5rem;
        align-items: center;
      }

      .hero__avatar {
        width: 180px;
        border-radius: var(--radius);
        object-fit: cover;
        border: 3px solid var(--color-border);
        box-shadow: var(--shadow-lg);
        transition: transform 0.3s ease, box-shadow 0.3s ease;
      }

      .hero__avatar:hover {
        transform: scale(1.05) rotate(1deg);
        box-shadow: var(--shadow-lg), 0 12px 32px rgba(0,0,0,0.12);
      }

      .hero__info h1 {
        font-size: 2rem;
        font-weight: 700;
        margin-bottom: 0.3rem;
        letter-spacing: -0.02em;
      }

      .hero__title {
        font-size: 1.05rem;
        color: var(--color-text-secondary);
        margin-bottom: 1rem;
        font-weight: 400;
      }

      .hero__desc {
        color: var(--color-text-secondary);
        font-size: 0.95rem;
        margin-bottom: 1.2rem;
        line-height: 1.7;
      }

      .hero__links {
        display: flex;
        gap: 0.6rem;
      }

      .hero__links a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 38px;
        height: 38px;
        font-size: 1.1rem;
        color: var(--color-text-secondary);
        background: var(--color-bg-alt);
        border: 1px solid var(--color-border);
        border-radius: 50%;
        text-decoration: none;
        transition: all 0.2s ease;
      }

      .hero__links a:hover {
        color: var(--color-primary);
        border-color: var(--color-primary);
        background: var(--color-primary-light);
        transform: translateY(-2px);
        box-shadow: var(--shadow-md);
      }

      /* Sections */
      .section {
        padding: 3rem 0;
      }

      .section__title {
        font-size: 1.5rem;
        font-weight: 700;
        margin-bottom: 1.5rem;
        letter-spacing: -0.01em;
        display: flex;
        align-items: center;
        gap: 0.6rem;
      }

      .section__title::before {
        content: '';
        display: inline-block;
        width: 4px;
        height: 1.2em;
        background: linear-gradient(180deg, var(--color-primary), var(--color-accent));
        border-radius: 2px;
      }

      .divider {
        border: none;
        height: 1px;
        background: var(--color-border);
      }

      /* Research interests grid */
      .research-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 1.2rem;
      }

      .research-card {
        padding: 1.5rem;
        background: var(--color-card-bg);
        border: 1px solid var(--color-border);
        border-radius: var(--radius);
        transition: all 0.25s ease;
        position: relative;
        overflow: hidden;
      }

      .research-card::after {
        content: '';
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        height: 3px;
        background: linear-gradient(90deg, var(--color-primary), var(--color-accent));
        opacity: 0;
        transition: opacity 0.25s ease;
      }

      .research-card:hover {
        border-color: var(--color-primary);
        box-shadow: var(--shadow-md);
        transform: translateY(-2px);
      }

      .research-card:hover::after {
        opacity: 1;
      }

      .research-card__icon {
        font-size: 1.4rem;
        color: var(--color-primary);
        margin-bottom: 0.8rem;
      }

      .research-card__title {
        font-size: 0.95rem;
        font-weight: 700;
        color: var(--color-text);
        margin-bottom: 0.7rem;
      }

      .research-card__topics {
        list-style: none;
        padding: 0;
        margin: 0;
      }

      .research-card__topics li {
        font-size: 0.82rem;
        color: var(--color-text-secondary);
        padding: 0.25rem 0;
        padding-left: 0.9rem;
        position: relative;
      }

      .research-card__topics li::before {
        content: '';
        position: absolute;
        left: 0;
        top: 0.65em;
        width: 5px;
        height: 5px;
        border-radius: 50%;
        background: var(--color-border);
      }

      .research-card:hover .research-card__topics li::before {
        background: var(--color-primary);
      }

      @media (max-width: 640px) {
        .research-grid {
          grid-template-columns: 1fr;
        }
      }

      /* Publications */
      .pub-year {
        font-size: 1.1rem;
        font-weight: 600;
        color: var(--color-primary);
        margin-top: 2rem;
        margin-bottom: 0.8rem;
        padding-bottom: 0.3rem;
        border-bottom: 2px solid var(--color-primary-light);
      }

      .pub-year:first-of-type {
        margin-top: 0;
      }

      .pub-item {
        padding: 1rem 1.2rem;
        margin-bottom: 0.6rem;
        background: var(--color-card-bg);
        border: 1px solid var(--color-border);
        border-radius: var(--radius);
        transition: all 0.2s ease;
      }

      .pub-item:hover {
        border-color: var(--color-primary);
        box-shadow: var(--shadow-md);
        transform: translateY(-1px);
      }

      .pub-item__title {
        font-weight: 600;
        font-size: 0.92rem;
        color: var(--color-text);
        margin-bottom: 0.25rem;
      }

      .pub-item__authors {
        font-size: 0.83rem;
        color: var(--color-text-secondary);
        margin-bottom: 0.2rem;
      }

      .pub-item__venue {
        font-size: 0.82rem;
        font-style: italic;
        color: var(--color-text-secondary);
      }

      .pub-item__links {
        margin-top: 0.5rem;
        display: flex;
        gap: 0.5rem;
        flex-wrap: wrap;
      }

      .pub-item__links a {
        font-size: 0.75rem;
        font-weight: 600;
        padding: 0.25rem 0.6rem;
        border-radius: 4px;
        text-decoration: none;
        background: var(--color-primary-light);
        color: var(--color-primary);
        transition: all 0.15s ease;
      }

      .pub-item__links a:hover {
        background: var(--color-primary);
        color: #fff;
      }

      /* Teaching */
      .teaching-grid {
        display: grid;
        gap: 0.8rem;
      }

      .teaching-card {
        padding: 1rem 1.2rem;
        background: var(--color-card-bg);
        border: 1px solid var(--color-border);
        border-radius: var(--radius);
        display: flex;
        align-items: baseline;
        gap: 1rem;
      }

      .teaching-card__code {
        font-family: var(--font-mono);
        font-size: 0.82rem;
        font-weight: 600;
        color: var(--color-primary);
        white-space: nowrap;
      }

      .teaching-card__name {
        font-size: 0.92rem;
        color: var(--color-text);
      }

      .teaching-prev {
        margin-top: 1rem;
        font-size: 0.85rem;
        color: var(--color-text-secondary);
      }

      /* Recruitment CTA */
      .cta-box {
        background: linear-gradient(135deg, var(--color-primary-light), rgba(124,58,237,0.06));
        border: 1px solid var(--color-primary);
        border-radius: var(--radius);
        padding: 1.5rem 1.8rem;
        position: relative;
        overflow: hidden;
      }

      .cta-box::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        width: 4px;
        height: 100%;
        background: linear-gradient(180deg, var(--color-primary), var(--color-accent));
      }

      .cta-box__title {
        font-weight: 700;
        font-size: 1rem;
        margin-bottom: 0.6rem;
        color: var(--color-text);
      }

      .cta-box__text {
        font-size: 0.9rem;
        color: var(--color-text-secondary);
        margin-bottom: 0.6rem;
      }

      .cta-box ul {
        list-style: none;
        padding: 0;
        margin-bottom: 0.8rem;
      }

      .cta-box ul li {
        font-size: 0.88rem;
        color: var(--color-text);
        padding: 0.2rem 0;
        padding-left: 1.2rem;
        position: relative;
      }

      .cta-box ul li::before {
        content: '\2022';
        position: absolute;
        left: 0;
        color: var(--color-primary);
        font-weight: 700;
      }

      /* Service pills */
      .service-list {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
      }

      .service-list span {
        padding: 0.35rem 0.8rem;
        background: var(--color-bg-alt);
        border: 1px solid var(--color-border);
        border-radius: 6px;
        font-size: 0.85rem;
        font-weight: 600;
      }

      /* Footer */
      .footer {
        padding: 2rem 0;
        margin-top: 2rem;
        border-top: 1px solid var(--color-border);
        text-align: center;
        font-size: 0.82rem;
        color: var(--color-text-secondary);
      }

      /* Responsive */
      @media (max-width: 640px) {
        .hero__grid {
          grid-template-columns: 1fr;
          text-align: center;
          gap: 1.5rem;
        }

        .hero__avatar {
          width: 140px;
          height: 140px;
          margin: 0 auto;
        }

        .hero__links {
          justify-content: center;
        }

        .nav__links {
          gap: 1rem;
        }

        .nav__links a {
          font-size: 0.8rem;
        }

        .section__title {
          font-size: 1.3rem;
        }

        .interests {
          justify-content: center;
        }
      }

      /* Scroll animations */
      .fade-in {
        opacity: 0;
        transform: translateY(16px);
        transition: opacity 0.5s ease, transform 0.5s ease;
      }

      .fade-in.visible {
        opacity: 1;
        transform: translateY(0);
      }
    </style>
  </head>

  <body>
    <!-- Floating theme toggle -->
    <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme">
      <i class="fas fa-moon"></i>
    </button>

    <div class="container">
      {{ content }}
    </div>

    <footer class="footer">
      <div class="container">
        &copy; {{ 'now' | date: "%Y" }} {{ site.author.name }} &middot; Built with Jekyll
      </div>
    </footer>

    <script>
      // Dark mode toggle
      function toggleTheme() {
        const html = document.documentElement;
        const current = html.getAttribute('data-theme');
        const next = current === 'dark' ? 'light' : 'dark';
        html.setAttribute('data-theme', next);
        localStorage.setItem('theme', next);
        updateIcon(next);
      }

      function updateIcon(theme) {
        const icon = document.querySelector('.theme-toggle i');
        icon.className = theme === 'dark' ? 'fas fa-sun' : 'fas fa-moon';
      }

      // Load saved theme (default to light)
      const saved = localStorage.getItem('theme') || 'light';
      document.documentElement.setAttribute('data-theme', saved);
      updateIcon(saved);

      // Scroll animations
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.classList.add('visible');
          }
        });
      }, { threshold: 0.1 });

      document.querySelectorAll('.fade-in').forEach(el => observer.observe(el));

    </script>
  </body>
</html>
